# Deploy PPGCOMDATA to production VPS via SSH + docker compose.
#
# Required GitHub repository secrets (Settings → Secrets and variables → Actions):
#   VPS_HOST     — VPS hostname or IP (not the SSH config alias)
#   VPS_USER     — SSH user (e.g. root)
#   VPS_SSH_KEY  — Private key (full PEM/OpenSSH block)
# Optional:
#   VPS_PORT     — SSH port (default 22)
#
# See DEPLOY.md for VPS git access, first-time setup, and manual deploy.

name: Deploy to VPS

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "apps/api/**"
      - "docker-compose.prod.yml"
      - "scripts/deploy-vps.sh"
      - ".github/workflows/deploy-vps.yml"
  workflow_dispatch:
    inputs:
      no_cache_web:
        description: "Build web with --no-cache (fixes stale Next.js builds)"
        type: boolean
        default: false
      no_cache_all:
        description: "Build web and api with --no-cache"
        type: boolean
        default: false

concurrency:
  group: deploy-vps-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy web + api on VPS
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          NO_CACHE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.no_cache_all && '1' || '0' }}
          NO_CACHE_WEB: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.no_cache_web && '1' || '0' }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 40m
          script_stop: true
          envs: NO_CACHE,NO_CACHE_WEB
          script: |
            set -euo pipefail
            export PPGCOMDATA_PROJECT_DIR=/root/projects/ppgcomdata
            export NO_CACHE="${NO_CACHE:-0}"
            export NO_CACHE_WEB="${NO_CACHE_WEB:-0}"
            bash "${PPGCOMDATA_PROJECT_DIR}/scripts/deploy-vps.sh"
