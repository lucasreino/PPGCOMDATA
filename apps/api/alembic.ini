# A generic, single database configuration for Alembic

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, required to import the models/SQLModel definitions
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone =

# limit the number of displayed characters of the database URL
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow Alembic to search for multiple sibling
# revisions in the case of a branching history
# Allow branches to merge
# subgraphs = false

# logging configuration is at the end of the file

[post_write_hooks]
# post_write_hooks defines scripts or methods that are run
# after a revision script is generated.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
